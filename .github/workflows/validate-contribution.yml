name: Validate Contribution

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Extract base repository.json
        run: |
          git show origin/${{ github.base_ref }}:data/repository.json \
            > /tmp/base_repository.json 2>/dev/null \
            || echo '{}' > /tmp/base_repository.json

      - name: Run validation
        run: |
          python pipeline/validate_contribution.py \
            --pr-repo data/repository.json \
            --base-repo /tmp/base_repository.json \
            > /tmp/comment.txt
          cat /tmp/comment.txt

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = '<!-- validate-contribution -->\n'
              + fs.readFileSync('/tmp/comment.txt', 'utf8');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.body.startsWith('<!-- validate-contribution -->')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
